---
# Helm charts to deploy in this lab environment
# This file is read by ocp4_workload_helm_from_content_repo

charts:
  # Simple Redis deployment for testing
  - name: redis
    enabled: true
    source:
      type: repository
      url: https://charts.bitnami.com/bitnami
      chart_ref: redis
      version: "20.0.0"  # Updated to 20.0.0 for Redis 7.4

    release:
      name: test-redis
      # namespace defaults to workload namespace (guid)
      values:
        # OpenShift SCC compatibility
        # Force adaptation because helm_template cannot auto-detect OpenShift
        # See: https://github.com/bitnami/charts/blob/main/bitnami/redis/README.md
        global:
          compatibility:
            openshift:
              adaptSecurityContext: force  # Remove hardcoded UID/GID, let OpenShift assign

        # Redis configuration
        architecture: standalone  # Single instance (not sentinel)
        auth:
          enabled: false  # No password for simplicity

        # Override image to use latest tag (simpler than version pinning for testing)
        image:
          tag: latest

        # Disable NetworkPolicy creation (sandbox service account lacks RBAC permissions)
        networkPolicy:
          enabled: false

        master:
          persistence:
            enabled: true
            size: 1Gi  # Small PVC for testing

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

    # Security constraints validated by workload
    security:
      allowClusterScopedResources: false
      allowPrivileged: false
      allowHostPath: false
      maxCpuLimit: 1000m
      maxMemoryLimit: 1Gi
      maxStorageClaim: 2Gi

    # Wait for pod readiness
    wait:
      enabled: true
      timeout: 300

    # Routes for external access (optional)
    routes:
      - name: redis
        service: test-redis-master  # Service name from helm chart
        host: redis                 # Hostname prefix (guid auto-appended)
        targetPort: 6379
        tls: true
        tls_termination: edge
        remove_x_frame_options: true  # Allow iframe embedding

  # PostgreSQL example (disabled by default)
  - name: postgresql
    enabled: true  # Enabled for testing
    source:
      type: repository
      url: https://charts.bitnami.com/bitnami
      chart_ref: postgresql
      version: "15.0.0"

    release:
      name: test-db
      # namespace defaults to workload namespace (guid)
      values:
        # OpenShift SCC compatibility (same as Redis)
        global:
          compatibility:
            openshift:
              adaptSecurityContext: force

        auth:
          postgresPassword: changeme  # Use common_password via catalog config
          database: testdb

        # Override image to use latest tag (simpler than version pinning for testing)
        image:
          tag: latest

        # Disable NetworkPolicy creation (sandbox service account lacks RBAC permissions)
        networkPolicy:
          enabled: false

        primary:
          persistence:
            size: 2Gi

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

    security:
      allowClusterScopedResources: false
      maxCpuLimit: 2000m
      maxMemoryLimit: 2Gi

    wait:
      enabled: true
      timeout: 600

    # Routes for external access (optional)
    # Note: Databases typically don't need Routes - access via Service DNS from other pods
