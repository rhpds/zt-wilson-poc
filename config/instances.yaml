---
# Foreman deployment via Helm chart (no VMs, only Helm-deployed infrastructure)
virtualmachines: []
containers:
  - name: foreman-tools
    image: quay.io/foreman/foreman-toolbox:latest
    environment: {}
    command:
      - /bin/sh
      - -c
      - sleep infinity
    ports:
      - 8080
    terminals:
      - name: foreman-cli
        command: /bin/bash
