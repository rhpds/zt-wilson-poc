---
# Helm-based Foreman deployment with CLI container
virtualmachines: []

containers:
  - name: foreman-cli
    image: quay.io/foreman/foreman:3.13-stable
    memory: 512Mi
    cpu: 250m
    ports:
      - name: dummy
        containerPort: 9999
        protocol: TCP
    environment:
      FOREMAN_HOST: "https://foreman-${guid}.${domain}/"
      FOREMAN_USERNAME: "admin"
      FOREMAN_PASSWORD: "{{ common_password }}"
    terminals:
      - name: foreman-cli
        command: /bin/bash --rcfile /root/.foreman_bashrc
    command:
      - /bin/bash
      - -c
      - |
        mkdir -p /root/.hammer/cli.modules.d
        cat > /root/.hammer/cli.modules.d/foreman.yml << HAMMEREOF
        :foreman:
          :enable_module: true
          :host: ${FOREMAN_HOST}
          :username: ${FOREMAN_USERNAME}
          :password: ${FOREMAN_PASSWORD}
          :verify_ssl: false
          :request_timeout: 120
        HAMMEREOF
        cat > /root/.foreman_bashrc << BASHEOF
        [ -f /etc/bashrc ] && . /etc/bashrc
        [ -f ~/.bashrc ] && . ~/.bashrc
        echo "Foreman CLI - Hammer Tool"
        echo "URL: ${FOREMAN_HOST}"
        echo "User: ${FOREMAN_USERNAME}"
        echo "Pass: ${FOREMAN_PASSWORD}"
        if timeout 5 hammer ping >/dev/null 2>&1; then echo "Connected"; hammer --version; else echo "API not ready - run hammer ping"; fi
        echo "Commands: hammer ping | hammer host list | hammer --help"
        BASHEOF
        exec sleep infinity
