---
# Helm-based Foreman deployment with CLI container
virtualmachines: []

containers:
  - name: foreman-cli
    image: quay.io/foreman/foreman:3.13-stable
    memory: 512Mi
    cpu: 250m
    ports:
      - name: dummy
        containerPort: 9999
        protocol: TCP
    environment:
      FOREMAN_HOST: "https://foreman-${guid}.${domain}/"
      FOREMAN_USERNAME: "admin"
      FOREMAN_PASSWORD: "{{ common_password }}"
    terminals:
      - name: foreman-cli
        command: /bin/bash --rcfile /root/.foreman_bashrc
    command:
      - /bin/bash
      - -c
      - |
        # Configure hammer CLI on container startup
        mkdir -p /root/.hammer/cli.modules.d/

        # Write hammer config with environment variable expansion
        cat > /root/.hammer/cli.modules.d/foreman.yml <<CONFIGEOF
        :foreman:
          :enable_module: true
          :host: '${FOREMAN_HOST}'
          :username: '${FOREMAN_USERNAME}'
          :password: '${FOREMAN_PASSWORD}'
          :verify_ssl: false
          :request_timeout: 120
        CONFIGEOF

        # Create custom bashrc for terminal
        cat > /root/.foreman_bashrc <<\BASHRC
        # Source system bashrc
        [ -f /etc/bashrc ] && . /etc/bashrc
        [ -f ~/.bashrc ] && . ~/.bashrc

        # Foreman CLI welcome message
        echo "==========================================="
        echo "  Foreman CLI - Hammer Tool"
        echo "==========================================="
        echo ""
        echo "Foreman URL: ${FOREMAN_HOST}"
        echo "Username: ${FOREMAN_USERNAME}"
        echo "Password: ${FOREMAN_PASSWORD}"
        echo ""
        echo "Testing connection to Foreman..."
        if timeout 5 hammer ping &>/dev/null; then
          echo "✓ Connected to Foreman API successfully"
          hammer --version
        else
          echo "⚠ Foreman API not ready yet (may still be initializing)"
          echo "  Run 'hammer ping' to test connectivity"
        fi
        echo ""
        echo "Common commands:"
        echo "  hammer ping                 - Test API connectivity"
        echo "  hammer organization list    - List organizations"
        echo "  hammer host list            - List hosts"
        echo "  hammer --help               - Show all commands"
        echo "==========================================="
        echo ""
        BASHRC

        # Keep container running
        exec sleep infinity
