---
# Foreman deployment via Helm chart (no VMs, only Helm-deployed infrastructure)
virtualmachines: []
containers:
  - name: foreman-tools
    image: quay.io/foreman/foreman:3.13-stable
    cpu: "250m"
    memory: "1Gi"
    environment: {}
    command:
      - /bin/sh
      - -c
      - sleep infinity
    args: []
    ports:
      - containerPort: 8080
        protocol: TCP
    terminals:
      - name: foreman-cli
        command: /bin/bash
