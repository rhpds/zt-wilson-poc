---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-redis-tasks
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: queue
spec:
  accessModes:
  - ReadWriteOnce
  {{- if .Values.redis.tasks.storageClass }}
  storageClassName: {{ .Values.redis.tasks.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.tasks.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis-tasks
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: queue
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
  selector:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: queue
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis-tasks
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: queue
spec:
  serviceName: {{ .Release.Name }}-redis-tasks
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: foreman
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: queue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: queue
    spec:
      containers:
      - name: redis-tasks
        image: {{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}
        imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        command:
        - redis-server
        - --port
        - "6379"
        - --appendonly
        - "yes"
        - --dir
        - /var/lib/redis/data
        volumeMounts:
        - name: redis-tasks-data
          mountPath: /var/lib/redis/data
        resources:
          {{- toYaml .Values.redis.tasks.resources | nindent 10 }}
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -p
            - "6379"
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -p
            - "6379"
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
      volumes:
      - name: redis-tasks-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-redis-tasks
