apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-multi-container
  labels:
    app: {{ .Release.Name }}-multi-container
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-multi-container
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-multi-container
    spec:
      containers:
      # Container 1: Redis server
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
        ports:
        - name: redis
          containerPort: {{ .Values.redis.port }}
          protocol: TCP
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        args:
          - redis-server
          - --bind
          - "127.0.0.1"  # Bind to localhost only (single-pod networking)
          - --save
          - ""  # Disable RDB persistence
          # AOF disabled to avoid permission issues with OpenShift random UIDs

      # Container 2: Redis Commander web UI (connects to localhost:6379)
      - name: commander
        image: "{{ .Values.commander.image.repository }}:{{ .Values.commander.image.tag }}"
        imagePullPolicy: {{ .Values.commander.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.commander.port }}
          protocol: TCP
        env:
        - name: REDIS_HOSTS
          value: "local:localhost:{{ .Values.redis.port }}"  # Connect to Redis on localhost
        resources:
          {{- toYaml .Values.commander.resources | nindent 10 }}
