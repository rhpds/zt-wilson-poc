---
# Multi-container pod test configuration
# Demonstrates localhost communication between containers

replicaCount: 1

# Redis container configuration
redis:
  image:
    repository: docker.io/redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Redis Commander web UI container
commander:
  image:
    repository: docker.io/rediscommander/redis-commander
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8081
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Service for web UI access
service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

# Route configuration for Showroom iframe
route:
  enabled: true
  host: "multi-test"  # Will be appended with -{{ guid }}.{{ domain }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
