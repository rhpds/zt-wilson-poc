---
lab:
  # Display name shown in the catalog
  name: "Foreman on OpenShift with Helm"

  description:
    # One-line summary used in catalog description and zerotouch PR
    summary: "Deploy Foreman lifecycle management platform using custom Helm charts"

    # Learning objective displayed in description.adoc
    goal: "Understand how to integrate custom Helm charts with RHDP Zerotouch labs"

    # Practical scenario for when this lab is useful
    use_case: "Learn Foreman architecture, Helm chart patterns, and AgnosticD workload configuration"

    # Topics covered, rendered as a bullet list in description.adoc
    concepts:
      - "Kubernetes Multi-Tier Architecture"
      - "Helm Chart Development"
      - "AgnosticD Workload Integration"
      - "NetworkPolicy Configuration"
      - "StatefulSet vs Deployment Patterns"

    # Estimated completion time in minutes (number only, workflow appends "min")
    time_to_complete: 60

  # Branch, tag, or release tag to deploy from (validated by the workflow)
  git_ref:
    production: "v0.0.1"
    development: "main"

  # Ansible BU-specific parameters (optional, ignored by rhelbu templates)
  ansible:
    ironrdp_enable: false
    auth_cloud_provider: "none"

  # Lab owner contact, shown in generated README
  maintainer: "Wilson Harris, wharris@redhat.com"
