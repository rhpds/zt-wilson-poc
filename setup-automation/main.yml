---
# Minimal setup playbook for helm-only testing
# No VMs/bastions required - helm charts deployed via ocp4_workload_helm_from_content_repo

- name: Helm-only setup (no VM required)
  hosts: localhost
  gather_facts: false
  vars:
    _showroom_env_guid: "{{ lookup('ansible.builtin.env', 'GUID') | default('') }}"
    _showroom_env_domain: "{{ lookup('ansible.builtin.env', 'DOMAIN') | default('') }}"
  tasks:

  - name: Log environment variables
    ansible.builtin.debug:
      msg: |
        Setup automation running (helm-only mode)
        GUID: {{ _showroom_env_guid }}
        DOMAIN: {{ _showroom_env_domain }}

        Helm charts deployed via ocp4_workload_helm_from_content_repo
        Access routes via Showroom UI or:
        oc get routes -n {{ _showroom_env_guid }}

  - name: Create marker file
    ansible.builtin.copy:
      content: |
        Setup completed at {{ ansible_date_time.iso8601 }}
        GUID={{ _showroom_env_guid }}
        DOMAIN={{ _showroom_env_domain }}

        This lab uses helm charts deployed via ocp4_workload_helm_from_content_repo.
        No VMs or containers from instances.yaml.
      dest: /tmp/helm-setup-complete.txt
      mode: '0644'
